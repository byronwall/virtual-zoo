services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: violets-stuffed-animal-zoo-app
    restart: unless-stopped
    depends_on:
      - rembg
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      BASE_PATH: ${BASE_PATH:-/}
      APP_DATA_DIR: /app/data
      SITE_TITLE: "${SITE_TITLE:-Violet's Stuffed Animal Zoo}"
      SITE_SHORT_TITLE: "${SITE_SHORT_TITLE:-Violet's Zoo}"
      SITE_PRIMARY_COLOR: ${SITE_PRIMARY_COLOR:-orange}
      SITE_ICON_VARIANT: ${SITE_ICON_VARIANT:-default}
      STUFFED_ZOO_PASSCODE: ${STUFFED_ZOO_PASSCODE:-passcode}
      BACKGROUND_REMOVAL_PROVIDER: ${BACKGROUND_REMOVAL_PROVIDER:-rembg}
      REMBG_SERVICE_URL: ${REMBG_SERVICE_URL:-http://rembg:7000}
    ports:
      - "${APP_PORT:-}:3000"
    volumes:
      - stuffed-zoo-data:/app/data

  rembg:
    build:
      context: ./rembg-service
    image: violets-stuffed-animal-zoo-rembg
    restart: unless-stopped
    expose:
      - "7000"
    volumes:
      - rembg-model-cache:/models

volumes:
  stuffed-zoo-data:
  rembg-model-cache:
