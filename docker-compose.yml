services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: violets-stuffed-animal-zoo-app
    restart: unless-stopped
    depends_on:
      - rembg
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      BASE_PATH: ${BASE_PATH:-/}
      APP_DATA_DIR: /app/data
      STUFFED_ZOO_PASSCODE: ${STUFFED_ZOO_PASSCODE:-violet}
      BACKGROUND_REMOVAL_PROVIDER: ${BACKGROUND_REMOVAL_PROVIDER:-rembg}
      REMBG_SERVICE_URL: ${REMBG_SERVICE_URL:-http://rembg:7000}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - stuffed-zoo-data:/app/data

  rembg:
    build:
      context: ./rembg-service
    image: violets-stuffed-animal-zoo-rembg
    restart: unless-stopped
    expose:
      - "7000"

volumes:
  stuffed-zoo-data:
